name: videocapture
role: video-io

default_branches:
  integration: develop
  release: master

entrypoints:
  configure_default:
    - cmake -S . -B build
  configure_gstreamer:
    - cmake -S . -B build -DUSE_GSTREAMER=ON
  build:
    - cmake --build build

owned_paths:
  - include/
  - src/
  - app/
  - cmake/
  - CMakeLists.txt
  - Readme.md
  - AGENTS.md

allowed_change_classes:
  - ci-triage
  - dependency-sync
  - io-regression-fix
  - docs-sync

forbidden_change_classes:
  - packaging-release-change
  - large-refactor
  - new-dependency

constraints:
  preserve_source_semantics: true
  preserve_backend_priority: true
  review_stream_behavior_changes: mandatory
